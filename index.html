<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte pêche France</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
    }

    #map {
      height: 100%;
    }

    .topbar, .legend {
      position: fixed;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      z-index: 10000;
    }

    .topbar {
      top: 10px;
      left: 10px;
      right: 10px;
    }

    .legend {
      bottom: 20px;
      left: 10px;
    }

    select {
      width: 100%;
      padding: 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <select id="departement">
    <option value="">Choisir un département</option>
    <option value="51">Marne (51)</option>
    <option value="10">Aube (10)</option>
    <option value="91">Essonne (91)</option>
  </select>
</div>

<div class="legend">
  <strong>Légende</strong><br>
  🔵 1ère catégorie<br>
  🔴 2ème catégorie<br>
  ⚫ Hors AAPPMA<br>
  ⚪ Autres rivières
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([46.5, 2.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let riversLayer;
let pecheLayer;

// STYLE fond (toutes rivières)
function styleRivers() {
  return {
    color: '#cccccc',
    weight: 1
  };
}

// STYLE officiel
function stylePeche(feature) {
  let cat = feature.properties.categorie;

  if (cat === 1) return { color: 'blue', weight: 4 };
  if (cat === 2) return { color: 'red', weight: 4 };

  return { color: 'black', weight: 4 };
}

// LOAD
function loadDepartement(dep) {

  if (riversLayer) map.removeLayer(riversLayer);
  if (pecheLayer) map.removeLayer(pecheLayer);

  // 🔥 1. Charger toutes les rivières (fond)
  var query = `
  [out:json][timeout:25];
  area["ref:INSEE"="${dep}"]->.a;
  (
    way["waterway"~"river|stream"](area.a);
  );
  out geom;
  `;

  fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  })
  .then(res => res.json())
  .then(data => {

    let geojson = {
      type: "FeatureCollection",
      features: data.elements.map(el => ({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: el.geometry.map(g => [g.lon, g.lat])
        }
      }))
    };

    riversLayer = L.geoJSON(geojson, {
      style: styleRivers
    }).addTo(map);

  });

  // 🔥 2. Charger tes données officielles
  fetch("data/peche_" + dep + ".geojson")
    .then(res => res.json())
    .then(data => {

      pecheLayer = L.geoJSON(data, {
        style: stylePeche,
        onEachFeature: function(feature, layer) {
          let cat = feature.properties.categorie;

          let label = cat === 1 ? "1ère catégorie" :
                      cat === 2 ? "2ème catégorie" :
                      "Hors AAPPMA";

          layer.bindPopup(
            "<strong>" + feature.properties.nom + "</strong><br>" +
            label
          );
        }
      }).addTo(map);

      map.fitBounds(pecheLayer.getBounds());

    });

}

// SELECT
document.getElementById("departement").addEventListener("change", function() {
  if (this.value) loadDepartement(this.value);
});

// GEOLOC
map.locate({setView: true, maxZoom: 12});

map.on('locationfound', function(e) {
  L.marker(e.latlng).addTo(map)
    .bindPopup("Vous êtes ici").openPopup();
});

</script>

</body>
</html>
