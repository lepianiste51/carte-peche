<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte pêche France</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      z-index: 10000;
    }

    .legend {
      position: fixed;
      bottom: 20px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      z-index: 10000;
      font-size: 14px;
    }

    select {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <select id="departement">
    <option value="">Choisir un département</option>
    <option value="75">Paris (75)</option>
    <option value="77">Seine-et-Marne (77)</option>
    <option value="78">Yvelines (78)</option>
    <option value="91">Essonne (91)</option>
    <option value="92">Hauts-de-Seine (92)</option>
    <option value="93">Seine-Saint-Denis (93)</option>
    <option value="94">Val-de-Marne (94)</option>
    <option value="95">Val-d'Oise (95)</option>
    <option value="51">Marne (51)</option>
    <option value="10">Aube (10)</option>
  </select>
</div>

<div class="legend">
  <strong>Légende</strong><br>
  🔵 Petit cours d’eau (≈ 1ère cat)<br>
  🔴 Rivière principale (≈ 2ème cat)<br>
  ⚫ Autres / non classé
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// INIT MAP
var map = L.map('map').setView([46.5, 2.5], 6);

// TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let currentLayer;

// STYLE
function getStyle(feature) {

  let type = feature.properties.type;

  if (type === "stream") {
    return { color: "blue", weight: 2 };
  }

  if (type === "river") {
    return { color: "red", weight: 3 };
  }

  return { color: "black", weight: 2 };
}

// POPUP
function onEachFeature(feature, layer) {
  layer.bindPopup(
    "<strong>" + feature.properties.nom + "</strong><br>" +
    "Type : " + feature.properties.type
  );
}

// LOAD DATA
function loadDepartement(dep) {

  if (currentLayer) {
    map.removeLayer(currentLayer);
  }

  // 🔥 Requête Overpass
  var query = `
  [out:json][timeout:25];
  area["ref:INSEE"="${dep}"]->.searchArea;
  (
    way["waterway"~"river|stream"](area.searchArea);
  );
  out geom;
  `;

  fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  })
  .then(res => res.json())
  .then(data => {

    var geojson = {
      "type": "FeatureCollection",
      "features": data.elements.map(el => ({
        "type": "Feature",
        "properties": {
          nom: el.tags.name || "Cours d'eau",
          type: el.tags.waterway
        },
        "geometry": {
          "type": "LineString",
          "coordinates": el.geometry.map(g => [g.lon, g.lat])
        }
      }))
    };

    currentLayer = L.geoJSON(geojson, {
      style: getStyle,
      onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds(currentLayer.getBounds());

  })
  .catch(err => {
    alert("Erreur chargement des rivières");
    console.error(err);
  });
}

// EVENT SELECT
document.getElementById("departement").addEventListener("change", function() {
  if (this.value) {
    loadDepartement(this.value);
  }
});

// GEOLOC
map.locate({setView: true, maxZoom: 12});

map.on('locationfound', function(e) {
  L.marker(e.latlng)
    .addTo(map)
    .bindPopup("Vous êtes ici")
    .openPopup();
});

</script>

</body>
</html>
